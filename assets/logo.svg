<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">sshmgr logo</title>
  <desc id="desc">A terminal-style badge with sshmgr wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1c2541"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5bc0be"/>
      <stop offset="100%" stop-color="#6fffe9"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="720" height="220" rx="24" fill="url(#bg)"/>
  <rect x="22" y="22" width="676" height="176" rx="18" fill="#0f172a" stroke="#334155" stroke-width="2"/>

  <circle cx="54" cy="50" r="8" fill="#ef4444"/>
  <circle cx="80" cy="50" r="8" fill="#f59e0b"/>
  <circle cx="106" cy="50" r="8" fill="#22c55e"/>

  <text x="48" y="120" fill="#94a3b8" font-family="monospace" font-size="34">$</text>
  <text x="82" y="120" fill="url(#accent)" font-family="monospace" font-size="52" font-weight="700">sshmgr</text>
  <text x="50" y="158" fill="#64748b" font-family="monospace" font-size="22">minimal ssh session manager</text>
</svg>
